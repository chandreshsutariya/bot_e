<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Playage — Diagram Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #f8fafc;
  --text: #0f172a;
  --muted: #475569;
  --shadow: 0 4px 12px rgba(0,0,0,0.05);
  --shadow-h: 0 8px 24px rgba(0,0,0,0.1);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html, body { 
  height: 100%; 
  font-family: 'Inter', sans-serif; 
  background: var(--bg); 
  color: var(--text); 
  overflow: hidden; 
}

/* ── HEADER ───────────────────────────────── */
.hdr {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; gap: 14px; padding: 12px 24px;
  background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
  border-bottom: 1px solid #e2e8f0;
}
.hdr-logo { font-size: 20px; }
.hdr-title { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
.hdr-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.hdr-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

.btn {
  display: flex; align-items: center; gap: 6px;
  background: #0f172a; color: #fff;
  border: none; border-radius: 8px;
  padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer;
  transition: 0.15s; font-family: inherit;
}
.btn:hover { background: #1e293b; }

/* ── CANVAS AREA ─────────────────────────── */
#canvas-wrap {
  position: absolute; top: 60px; left: 0; right: 0; bottom: 0;
  overflow: hidden; cursor: grab;
  /* Dot grid pattern */
  background-image: radial-gradient(circle, #cbd5e1 1.5px, transparent 1.5px);
  background-size: 28px 28px;
}
#canvas-wrap.panning { cursor: grabbing; }

#canvas {
  position: absolute; top: 0; left: 0;
  transform-origin: 0 0;
}

#canvas-lines {
  position: absolute; top: 0; left: 0;
  pointer-events: none; z-index: 1;
}

#canvas-content {
  position: relative; z-index: 2;
  display: inline-flex; flex-direction: column; align-items: center;
  padding: 60px;
}

/* ── FLEXBOX TREE ─────────────────────────── */
.tree-branch {
  display: flex; flex-direction: column; align-items: center;
}
.tree-children {
  display: flex; justify-content: center; gap: 32px;
  padding-top: 48px; position: relative;
  transition: opacity 0.2s;
}
.tree-children.collapsed {
  display: none;
}

/* ── NODE UI ──────────────────────────────── */
.tree-node {
  position: relative;
  border: 1.5px solid #0f172a;
  border-radius: 12px;
  padding: 14px 20px;
  min-width: 160px;
  max-width: 190px;
  text-align: center;
  background: #fff; /* fallback */
  box-shadow: 0 4px 0 rgba(15,23,42,0.08);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  user-select: none;
}
.tree-node:hover {
  transform: translateY(-3px);
  box-shadow: 0 7px 0 rgba(15,23,42,0.12);
}
.tree-node.leaf-node {
  padding: 12px 16px;
  min-width: 140px;
  max-width: 160px;
}

/* Badge (Top-left circle) */
.t-badge {
  position: absolute; top: -12px; left: -12px;
  width: 24px; height: 24px;
  background: #0f172a; color: #fff;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  box-shadow: 0 0 0 2.5px #fff;
  font-family: 'JetBrains Mono', monospace;
}

/* Text */
.t-title {
  font-size: 13px; font-weight: 700; color: #0f172a;
  line-height: 1.3;
}
.leaf-node .t-title {
  font-size: 12px; font-weight: 600;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.t-sub {
  font-size: 11px; color: #334155;
  margin-top: 4px; font-weight: 500;
}
.leaf-node .t-sub {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  background: rgba(15,23,42,0.06); padding: 2px 6px; border-radius: 4px;
  display: inline-block; margin-top: 6px;
}

/* Link overlay */
.t-link {
  display: inline-block; margin-top: 10px;
  font-size: 10px; font-weight: 600; color: #0f172a;
  text-decoration: none; padding: 4px 10px;
  border-radius: 6px; background: rgba(15,23,42,0.06);
  transition: background 0.15s;
}
.t-link:hover { background: rgba(15,23,42,0.1); }

/* Collapse hint */
.t-hint {
  font-size: 10px; color: rgba(15,23,42,0.5);
  margin-top: 6px; font-weight: 600;
}

/* ── STATE ───────────────────────────────── */
.msg-box {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  text-align: center; z-index: 300;
}
.spinner {
  width: 36px; height: 36px; border: 3px solid #e2e8f0;
  border-top-color: #0f172a; border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.msg-box h3 { font-size: 15px; }
.msg-box p { font-size: 12px; color: var(--muted); }

/* Custom Badge Colors */
.badge-root { background: #9333ea; }
.badge-bo { background: #0284c7; }
.badge-cms { background: #db2777; }
.badge-crm { background: #16a34a; }
.badge-bas { background: #ea580c; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <span class="hdr-logo">📊</span>
  <div>
    <div class="hdr-title">LLM Evaluation Diagram Style</div>
    <div class="hdr-sub">Playage ETL Pipeline Visualizer</div>
  </div>
  <div class="hdr-right">
    <button class="btn" id="refresh-btn" onclick="fetchAndRender()">Refresh Data</button>
  </div>
</header>

<!-- MAIN VIEWPORT -->
<div id="canvas-wrap">
  <div id="canvas">
    <svg id="canvas-lines"></svg>
    <div id="canvas-content"></div>
  </div>
</div>

<!-- LOADING -->
<div class="msg-box" id="msg-box">
  <div class="spinner"></div>
  <h3>Generating Tree…</h3>
  <p>Fetching data from the backend.</p>
</div>

<script>
const API_KEY  = "tmkoc_23prteam_bas_crm_cms_bo_final_version_1.0_7542321";
const API_BASE = window.location.origin;

// Diagram Pastel Colors
const COLORS = {
  ROOT: "#e9d5ff", // purple-200
  BO:   "#bae6fd", // sky-200
  CMS:  "#fbcfe8", // pink-200
  CRM:  "#bbf7d0", // green-200
  BAS:  "#fed7aa", // orange-200
  LEAF: "#ffffff", // pure white for documents
};
const BADGE_CLASSES = { ROOT: "badge-root", BO: "badge-bo", CMS: "badge-cms", CRM: "badge-crm", BAS: "badge-bas" };

let globalTreeData = null;

/* ══════════════════════════════════════
   PAN + ZOOM
══════════════════════════════════════ */
let pz = { x: 0, y: 0, scale: 1 };
let dragging = false, drag0 = {};
const canvasWrap = document.getElementById("canvas-wrap");
const canvas = document.getElementById("canvas");

function applyPZ() {
  canvas.style.transform = `translate(${pz.x}px,${pz.y}px) scale(${pz.scale})`;
}

canvasWrap.addEventListener("mousedown", e => {
  if(e.target.closest(".tree-node")) return;
  dragging = true;
  canvasWrap.classList.add("panning");
  drag0 = { mx: e.clientX, my: e.clientY, px: pz.x, py: pz.y };
});

window.addEventListener("mousemove", e => {
  if(!dragging) return;
  pz.x = drag0.px + e.clientX - drag0.mx;
  pz.y = drag0.py + e.clientY - drag0.my;
  applyPZ();
});

window.addEventListener("mouseup", () => {
  dragging = false; 
  canvasWrap.classList.remove("panning");
});

canvasWrap.addEventListener("wheel", e => {
  e.preventDefault();
  const f = e.deltaY > 0 ? 0.9 : 1.1;
  const nx = pz.scale * f;
  if(nx < 0.05 || nx > 3) return;
  
  const r = canvasWrap.getBoundingClientRect();
  const mx = e.clientX - r.left;
  const my = e.clientY - r.top;
  
  pz.x = mx - f * (mx - pz.x);
  pz.y = my - f * (my - pz.y);
  pz.scale = nx;
  applyPZ();
}, {passive: false});


/* ══════════════════════════════════════
   FETCH DATA
══════════════════════════════════════ */
async function fetchAndRender() {
  const msgBox = document.getElementById("msg-box");
  msgBox.style.display = "flex";
  try {
    const res = await fetch(`${API_BASE}/tree`, { headers: { Authorization: `Bearer ${API_KEY}` } });
    if(!res.ok) throw new Error("HTTP " + res.status);
    globalTreeData = await res.json();
    buildDOMTree(globalTreeData);
    msgBox.style.display = "none";
  } catch(e) {
    msgBox.innerHTML = `<div style="font-size:40px">⚠️</div><h3>Error</h3><p>${e.message}</p>`;
  }
}

/* ══════════════════════════════════════
   BUILD DOM
══════════════════════════════════════ */
function buildDOMTree(apiData) {
  if(!apiData.modules) return;
  
  // 1. Transform API data to Recursive Format
  const rootNode = {
    title: "Playage Backoffice",
    subtitle: `${apiData.total_documents} pages`,
    badge: "1",
    bClass: "badge-root",
    color: COLORS.ROOT,
    isExpanded: true,
    children: []
  };

  let mIndex = 1;
  Object.values(apiData.modules).forEach(mod => {
    const mColor = COLORS[mod.key] || COLORS.BAS;
    const mBClass = BADGE_CLASSES[mod.key] || "badge-bas";
    
    const mNode = {
      title: mod.label,
      subtitle: `${mod.total} pages`,
      badge: String.fromCharCode(64 + mIndex), // A, B, C, D
      bClass: mBClass,
      color: mColor,
      isExpanded: true,
      children: []
    };
    
    let cIndex = 1;
    Object.values(mod.categories).forEach(cat => {
      const cNode = {
        title: cat.name,
        subtitle: `${cat.total} docs`,
        badge: cIndex,
        bClass: mBClass,
        color: mColor,
        isExpanded: false, // Collapsed by default for diagram clarity
        children: []
      };
      
      cat.pages.forEach(page => {
        cNode.children.push({
          title: page.title || page.doc_id,
          subtitle: page.page_id,
          url: page.url,
          color: COLORS.LEAF,
          borderColor: mColor,
          isLeaf: true
        });
      });
      mNode.children.push(cNode);
      cIndex++;
    });
    rootNode.children.push(mNode);
    mIndex++;
  });

  // 2. Render Flexbox DOM
  const content = document.getElementById("canvas-content");
  content.innerHTML = "";
  content.appendChild(createBranch(rootNode));
  
  // 3. Draw lines and recenter
  setTimeout(() => {
    drawLines();
    centerTree();
  }, 100);
}

function createBranch(nodeData) {
  const branch = document.createElement("div");
  branch.className = "tree-branch";
  
  // Node Element
  const node = document.createElement("div");
  node.className = `tree-node ${nodeData.isLeaf ? "leaf-node" : ""}`;
  node.style.background = nodeData.color;
  if(nodeData.borderColor) {
    node.style.borderColor = "#0f172a"; // Keep solid border but maybe colored bottom shadow?
    node.style.boxShadow = `0 4px 0 ${nodeData.borderColor}, 0 4px 12px rgba(0,0,0,0.06)`;
  }
  
  let html = "";
  if(nodeData.badge) {
    html += `<div class="t-badge ${nodeData.bClass || ""}">${nodeData.badge}</div>`;
  }
  html += `<div class="t-title">${nodeData.title}</div>`;
  if(nodeData.subtitle) html += `<div class="t-sub">${nodeData.subtitle}</div>`;
  
  if(nodeData.url) {
     html += `<a href="${nodeData.url}" target="_blank" class="t-link" onclick="event.stopPropagation()">View Live ↗</a>`;
  } else if (nodeData.children && nodeData.children.length > 0) {
     const hint = nodeData.isExpanded ? "Click to collapse" : "Click to expand";
     html += `<div class="t-hint">${hint}</div>`;
  }
  
  node.innerHTML = html;
  
  // Toggle Logic
  if (nodeData.children && nodeData.children.length > 0) {
    node.addEventListener("click", () => {
      const childrenDiv = branch.querySelector(":scope > .tree-children");
      const isCol = childrenDiv.classList.contains("collapsed");
      if(isCol) {
         childrenDiv.classList.remove("collapsed");
         node.querySelector(".t-hint").innerText = "Click to collapse";
      } else {
         childrenDiv.classList.add("collapsed");
         node.querySelector(".t-hint").innerText = "Click to expand";
      }
      setTimeout(drawLines, 50); // Redraw SVG lines after DOM recalculates
    });
  }
  
  branch.appendChild(node);
  
  // Children Element
  if (nodeData.children && nodeData.children.length > 0) {
    const childrenContainer = document.createElement("div");
    childrenContainer.className = "tree-children";
    if (!nodeData.isExpanded) childrenContainer.classList.add("collapsed");
    
    nodeData.children.forEach(c => {
      childrenContainer.appendChild(createBranch(c));
    });
    branch.appendChild(childrenContainer);
  }
  
  return branch;
}

/* ══════════════════════════════════════
   DRAW SVG LINES
══════════════════════════════════════ */
function drawLines() {
  const svg = document.getElementById("canvas-lines");
  const content = document.getElementById("canvas-content");
  
  // Resize SVG to match dynamic flexbox content
  svg.setAttribute("width", content.offsetWidth);
  svg.setAttribute("height", content.offsetHeight);
  svg.innerHTML = `
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a" />
      </marker>
    </defs>
  `;
  
  const contentRect = content.getBoundingClientRect();
  
  document.querySelectorAll(".tree-branch").forEach(branch => {
    const parent = branch.querySelector(":scope > .tree-node");
    const children = branch.querySelector(":scope > .tree-children");
    
    if (children && !children.classList.contains("collapsed")) {
      const pRect = parent.getBoundingClientRect();
      const px = pRect.left + pRect.width/2 - contentRect.left;
      const py = pRect.bottom - contentRect.top;
      
      children.querySelectorAll(":scope > .tree-branch > .tree-node").forEach(child => {
        const cRect = child.getBoundingClientRect();
        const cx = cRect.left + cRect.width/2 - contentRect.left;
        const cy = cRect.top - contentRect.top;
        
        // Straight line with arrowhead
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        // Pull the line up slightly so arrow head doesn't clip
        path.setAttribute("d", `M ${px} ${py} L ${cx} ${cy - 4}`);
        path.setAttribute("fill", "none");
        path.setAttribute("stroke", "#0f172a");
        path.setAttribute("stroke-width", "1.5");
        path.setAttribute("marker-end", "url(#arrow)");
        
        svg.appendChild(path);
      });
    }
  });
}

function centerTree() {
  const content = document.getElementById("canvas-content");
  const cw = content.offsetWidth;
  const ch = content.offsetHeight;
  const ww = canvasWrap.clientWidth;
  const wh = canvasWrap.clientHeight;
  
  // Scale so it fits vertically or horizontally
  pz.scale = Math.min(1, Math.min((ww - 100) / cw, (wh - 100) / ch));
  if (pz.scale < 0.1) pz.scale = 0.2; // absolute min
  
  pz.x = (ww - cw * pz.scale) / 2;
  pz.y = 80;
  
  applyPZ();
}

// Redraw lines on window resize
window.addEventListener("resize", () => {
  drawLines();
});

// Init
fetchAndRender();
</script>
</body>
</html>
